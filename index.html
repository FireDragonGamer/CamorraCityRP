<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camorra City RP</title>

    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180x180.png">
    <link rel="icon" sizes="192x192" href="android-icon-192x192.png">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Arial', sans-serif; overflow: hidden; }

        #video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }

        /* Navigation */
        nav { 
            display: flex; 
            align-items: center; 
            padding: 30px 30px; 
            background: rgba(0,0,0,0.6); 
            position: relative;
        }
        
        .logo-container { position: absolute; left: 30px; }
        .logo { height: 60px; cursor: pointer; transition: 0.3s; }
        .logo:hover { transform: scale(1.1); }
        
        .nav-links { flex-grow: 1; text-align: center; }
        .nav-links a { color: white; margin: 0 20px; text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; position: relative; }
        .nav-links a:hover { color: #ff00ff; }
        
        /* Animierter Stil für die aktive Seite */
        .nav-links a.active {
            color: #ff00ff;
            animation: pulse 2s infinite;
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 5px #ff00ff; }
            50% { text-shadow: 0 0 15px #ff00ff, 0 0 20px #00d4ff; }
            100% { text-shadow: 0 0 5px #ff00ff; }
        }
        
        .hr-line { height: 3px; width: 100%; background: linear-gradient(90deg, #ff00ff, #00d4ff, #ff00ff); background-size: 200% 100%; animation: gradient-move 3s linear infinite; }
        @keyframes gradient-move { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }

        .hero { margin-top: 10vh; color: white; text-align: center; }
        h1 { font-size: 7rem; line-height: 0.9; text-transform: uppercase; letter-spacing: 5px; margin: 0; text-shadow: 4px 4px 15px #ff00ff; }

        .btn { 
            display: inline-block; 
            margin-top: 40px; 
            padding: 15px 40px; 
            background-color: transparent; 
            border: 2px solid #ff00ff; 
            color: white; 
            text-decoration: none; 
            font-size: 1.2rem; 
            font-weight: bold;
            transition: 0.5s; 
        }
        .btn:hover { 
            border-color: transparent;
            background: linear-gradient(90deg, #ff00ff, #00d4ff, #ff00ff);
            background-size: 200% 100%;
            animation: gradient-move 2s linear infinite;
            color: white;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        footer { 
            position: fixed; bottom: 0; width: 100%; padding: 15px; 
            background: rgba(0,0,0,0.7); text-align: center; color: #aaa; font-size: 0.8rem; border-top: 1px solid #333;
        }
        footer a { color: #aaa; text-decoration: none; margin: 0 10px; }
        footer a:hover { color: #ff00ff; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="video-bg">
        <source src="video.mp4" type="video/mp4">
    </video>

    <nav>
        <div class="logo-container">
            <a href="index.html"><img src="logo.gif" alt="Logo" class="logo"></a>
        </div>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="serverinfos.html">Serverinfos</a>
            <a href="regeln.html">Regeln</a>
            <a href="news.html">News</a>
        </div>
    </nav>
    <div class="hr-line"></div>

    <div class="hero">
        <h1>Camorra<br>City RP</h1>
        <a href="https://discord.gg/5F74fThRG3" class="btn" target="_blank">Discord Beitreten</a>
    </div>

    <footer>
        <a href="impressum.html">Impressum</a> | <a href="datenschutz.html">Datenschutz</a>
    </footer>

</body>
</html>
