<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>News - Camorra City RP</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180x180.png">
    <link rel="icon" sizes="192x192" href="android-icon-192x192.png">

    <style>
        body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Arial', sans-serif; background: #000; color: white; padding-bottom: 60px; }
        body { background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('news_bg.jpeg') no-repeat center top fixed; background-size: cover; }
        
        /* Navigation */
        nav { 
            display: flex; 
            align-items: center; 
            padding: 30px 30px; 
            background: rgba(0,0,0,0.6); 
            position: relative;
        }
        
        .logo-container { position: absolute; left: 30px; }
        .logo { height: 60px; cursor: pointer; transition: 0.3s; }
        .logo:hover { transform: scale(1.1); }
        
        .nav-links { flex-grow: 1; text-align: center; }
        .nav-links a { color: white; margin: 0 20px; text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; position: relative; }
        .nav-links a:hover { color: #ff00ff; }
        
        .nav-links a.active {
            color: #ff00ff;
            animation: pulse 2s infinite;
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 5px #ff00ff; }
            50% { text-shadow: 0 0 15px #ff00ff, 0 0 20px #00d4ff; }
            100% { text-shadow: 0 0 5px #ff00ff; }
        }
        
        /* Animierte Trennlinie & Border */
        .hr-line { height: 3px; width: 100%; background: linear-gradient(90deg, #ff00ff, #00d4ff, #ff00ff); background-size: 200% 100%; animation: gradient-move 3s linear infinite; }
        @keyframes gradient-move { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }
        
        .container { max-width: 800px; margin: 50px auto; padding: 20px; }
        
        /* Animierter Border für die News-Boxen */
        .rule-border { 
            position: relative; padding: 3px; border-radius: 22px; margin-bottom: 40px; 
            background: linear-gradient(90deg, #ff00ff, #00d4ff, #ff00ff); 
            background-size: 200% 100%; 
            animation: gradient-move 3s linear infinite; 
        }
        .rule-card { background: rgba(0, 0, 0, 0.9); border-radius: 20px; padding: 30px; }
        
        h1 { text-align: center; text-transform: uppercase; margin-bottom: 50px; }
        h2 { color: #00d4ff; margin-top: 0; }

        footer { 
            position: fixed; bottom: 0; width: 100%; padding: 15px; 
            background: rgba(0,0,0,0.8); text-align: center; color: #aaa; font-size: 0.8rem; border-top: 1px solid #333;
        }
        footer a { color: #aaa; text-decoration: none; margin: 0 10px; }
        footer a:hover { color: #ff00ff; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <a href="index.html"><img src="logo.gif" alt="Logo" class="logo"></a>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="serverinfos.html">Serverinfos</a>
            <a href="regeln.html">Regeln</a>
            <a href="news.html" class="active">News</a>
        </div>
    </nav>
    <div class="hr-line"></div>

    <div class="container" id="news-container">
        <h1>Aktuelle News</h1>
    </div>

    <footer>
        <a href="impressum.html">Impressum</a> | <a href="datenschutz.html">Datenschutz</a>
    </footer>

    <script>
        const newsData = [
          { date: "29.06.2026", time: "12:00", title: "Neues Update der Staatsbank", content: "Die Sicherheitsvorkehrungen wurden verschärft." },
          { date: "28.06.2026", time: "18:30", title: "Großes Event am Pier", content: "Die Camorra lädt zum Abendessen ein." }
        ];
        const container = document.getElementById('news-container');
        newsData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'rule-border';
            div.innerHTML = `<div class="rule-card"><small style="color: #ff00ff;">${item.date} | ${item.time}</small><h2>${item.title}</h2><p>${item.content}</p></div>`;
            container.appendChild(div);
        });
    </script>
</body>
</html>
